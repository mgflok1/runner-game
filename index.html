
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#383fa1">
    <link rel="icon" href="assets/icon.png" type="image/x-icon">
    <title>Maxim Gladkov</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg-primary: #4b52ab;
            --bg-navbar: #383fa1;
            --bg-accent: #3b408e;
            --bg-secondary: #404697;
            --bg-card: rgba(255, 255, 255, 0.08);
            --bg-card-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #f0f0f0;
            --text-dark: #000000;
            --text-gray: #808080;
            --nav-height: 80px;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--nav-height); 
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-primary); 
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        img {
            height: auto;
            max-width: 100%;
            vertical-align: middle;
        }

        .section-title {
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 50px; 
            min-height: 100vh;
            padding-top: var(--nav-height); 
        }

        .text-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .greeting {
            font-size: clamp(1rem, 2vw, 1.3rem); 
            opacity: 0.9;
        }

        .name {
            font-size: clamp(2.2rem, 6vw, 4rem); 
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.1;
        }

        .role-container {
            font-size: clamp(1.6rem, 5vw, 2.5rem); 
            font-weight: 700;
        }

        .subtitle {
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            opacity: 0.8;
            margin-top: 5px;
        }

        .avatar-section {
            width: clamp(200px, 35vw, 350px); 
            height: clamp(200px, 35vw, 350px);
            background-color: var(--bg-accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            cursor: pointer;
        }

        .avatar-section svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 768px) {
            .hero-section {
                flex-direction: column-reverse;
                text-align: center;
                padding-top: 100px;
            }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // =========================================
            // 1. ScrollReveal Логика
            // =========================================
            const srTop = ScrollReveal({ origin: 'top', distance: '100px', duration: 2000, reset: true });

            srTop.reveal('.greeting', { delay: 300 });
            srTop.reveal('.name', { delay: 200 });
            srTop.reveal('.role-container', { delay: 100 });
            srTop.reveal('.subtitle');

            const srRight = ScrollReveal({ origin: 'right', distance: '300px', duration: 2000, reset: true });
            srRight.reveal('.avatar-section');

            // =========================================
            // 4. GSAP Интерактивный SVG-Аватар
            // =========================================
            const dom = {
                face: document.querySelector(".face"),
                pupil: document.querySelectorAll(".pupil"),
                innerFace: document.querySelector(".inner-face"),
                hairFront: document.querySelector(".hair-front"),
                hairBack: document.querySelector(".hair-back"),
                shadow: document.querySelectorAll(".shadow"),
                ear: document.querySelectorAll(".ear"),
                eyebrowLeft: document.querySelector(".eyebrow-left"),
                eyebrowRight: document.querySelector(".eyebrow-right")
            };

            let xPosition, yPosition, svgHeight, svgWidth;
            let storedXPosition = 0;
            let storedYPosition = 0;

            gsap.set(".bg", { transformOrigin: "50% 50%" });
            gsap.set(".ear-right", { transformOrigin: "0% 50%" });
            gsap.set(".ear-left", { transformOrigin: "100% 50%" });
            gsap.set(".me", { opacity: 1 });
            gsap.set(".eyes", { transformOrigin: "50% 50%" });

            const meTl = gsap.timeline({ onComplete: addMouseEvent, delay: 1 });
            
            meTl.from(".me", { duration: 1, yPercent: 100, ease: "elastic.out(0.5, 0.4)" }, 0.5)
                .from(".head , .hair , .shadow", { duration: 0.9, yPercent: 20, ease: "elastic.out(0.58, 0.25)" }, 0.6)
                .from(".ear-right", { duration: 1, rotate: 40, yPercent: 10, ease: "elastic.out(0.5, 0.2)" }, 0.7)
                .from(".ear-left", { duration: 1, rotate: -40, yPercent: 10, ease: "elastic.out(0.5, 0.2)" }, 0.7)
                .from(".eyebrow-right , .eyebrow-left", { duration: 1, yPercent: 150, ease: "elastic.out(0.5, 0.2)" }, 0.7)
                .to(".eye-right , .eye-left", { duration: 0.01, opacity: 1 }, 0.85);

            gsap.timeline({ repeat: -1, repeatDelay: 5 })
                .to(".eyes", { duration: 0.1, scaleY: -0.1, ease: "power1.inOut" })
                .to(".eyes", { duration: 0.1, scaleY: -1, ease: "power1.inOut" });

            const percentage = (partialValue, totalValue) => (100 * partialValue) / totalValue;

            const updateScreenCoords = (event) => {
                if (event.touches && event.touches.length > 0) {
                    xPosition = event.touches[0].clientX;
                    yPosition = event.touches[0].clientY;
                } else {
                    xPosition = event.clientX;
                    yPosition = event.clientY;
                }
            };

            const animateFace = () => {
                if (!xPosition || (storedXPosition === xPosition && storedYPosition === yPosition)) return;

                const x = percentage(xPosition, svgWidth) - 50;
                const y = percentage(yPosition, svgHeight) - 50;
                const yHigh = percentage(yPosition, svgHeight) - 20;
                const yLow = percentage(yPosition, svgHeight) - 80;

                gsap.to(dom.face, { yPercent: yLow / 30, xPercent: x / 30 });
                gsap.to(dom.pupil, { yPercent: yHigh / 3, xPercent: x / 2 });
                gsap.to(dom.innerFace, { yPercent: y / 6, xPercent: x / 8 });
                gsap.to(dom.hairFront, { yPercent: yHigh / 15, xPercent: x / 22 });
                gsap.to([dom.hairBack, dom.shadow], { yPercent: (yLow / 20) * -1, xPercent: (x / 20) * -1 });
                gsap.to(dom.ear, { yPercent: (y / 1.5) * -1, xPercent: (x / 10) * -1 });
                gsap.to([dom.eyebrowLeft, dom.eyebrowRight], { yPercent: y * 0.1 });

                storedXPosition = xPosition;
                storedYPosition = yPosition;
            };

            function addMouseEvent() {
                const safeToAnimate = window.matchMedia("(prefers-reduced-motion: no-preference)").matches;
                if (safeToAnimate) {
                    window.addEventListener("mousemove", updateScreenCoords);
                    window.addEventListener("touchstart", updateScreenCoords, { passive: true });
                    window.addEventListener("touchmove", updateScreenCoords, { passive: true });
                    gsap.ticker.add(animateFace);
                }
            }

            const updateSvgWindowSize = () => {
                svgHeight = window.innerHeight;
                svgWidth = window.innerWidth;
            };
            
            updateSvgWindowSize();
            window.addEventListener("resize", updateSvgWindowSize);
        });
    </script>
